<script>
(function() {
    const splashShown = sessionStorage.getItem('splashShown');
    const splash = document.getElementById('splash-screen');
    const targetLogo = document.querySelector('.logo-img') || document.querySelector('.header-logo');

    // ΑΝ ΔΕΝ ΤΟ ΕΧΕΙ ΞΑΝΑΔΕΙ: Το εμφανίζουμε αμέσως
    if (!splashShown) {
        if (splash) splash.style.display = 'flex';
        if (targetLogo) targetLogo.style.opacity = '0';
    } else {
        // ΑΝ ΤΟ ΕΧΕΙ ΞΑΝΑΔΕΙ: Το κρατάμε κρυμμένο και δείχνουμε το λογότυπο
        if (targetLogo) targetLogo.style.opacity = '1';
        return; // Τερματισμός, δεν τρέχει τίποτα άλλο
    }

    // Το animation τρέχει μόνο αν φτάσουμε εδώ (δηλαδή αν δεν υπάρχει το splashShown)
    window.addEventListener('load', () => {
        const movingLogo = document.getElementById('moving-logo');
        
        setTimeout(() => {
            const startRect = movingLogo.getBoundingClientRect();
            const endRect = targetLogo.getBoundingClientRect();

            const deltaX = endRect.left - startRect.left;
            const deltaY = endRect.top - startRect.top;
            const scale = endRect.width / startRect.width;

            document.querySelectorAll('.splash-content h1, .splash-content p').forEach(el => {
                el.style.opacity = '0';
                el.style.transition = 'opacity 0.5s';
            });

            movingLogo.style.transformOrigin = 'top left';
            movingLogo.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(${scale})`;
            
            setTimeout(() => {
                targetLogo.style.opacity = '1';
                movingLogo.style.opacity = '0';
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                
                sessionStorage.setItem('splashShown', 'true');
                
                // Προαιρετικά το αφαιρούμε τελείως από το DOM μετά το animation
                setTimeout(() => splash.style.display = 'none', 600);
            }, 1800); 
        }, 2500); 
    });
})();


</script>

  <script>
document.addEventListener('DOMContentLoaded', () => {
    const carousel = document.getElementById('reviewsCarousel');
    const prevBtn = document.getElementById('reviewPrevBtn');
    const nextBtn = document.getElementById('reviewNextBtn');
    const cards = carousel.querySelectorAll('.review-card');
    let currentIndex = 0;
    let autoSlideInterval;

    const GAP = 24; // Κενό που ορίστηκε στο CSS (gap: 24px)

    // Επιστρέφει πόσες κάρτες εμφανίζονται σε κάθε slide (1 για mobile, 3 για desktop)
    function getItemsPerSlide() {
        // Ελέγχει το πλάτος του viewport
        return window.innerWidth <= 900 ? 1 : 3; 
    }

    // Υπολογίζει πόσο πρέπει να μετακινηθεί το carousel (Πλάτος Κάρτας + Κενό)
    function getCardMoveOffset() {
        if (cards.length === 0) return 0;

        const cardWidth = cards[0].offsetWidth;
        const itemsPerSlide = getItemsPerSlide();
        
        // Σε mobile, το κενό είναι 0. Σε desktop, είναι 24px.
        return itemsPerSlide === 1 ? cardWidth : cardWidth + GAP;
    }

    // Ενημερώνει τη θέση του carousel και την κατάσταση των κουμπιών
    function updateCarousel() {
        const moveOffset = getCardMoveOffset();
        const slideTransform = moveOffset * currentIndex;

        carousel.style.transform = `translateX(-${slideTransform}px)`;

        const totalItems = cards.length;
        const itemsPerSlide = getItemsPerSlide();
        
        // Ο μέγιστος δείκτης που μπορεί να φτάσει το carousel πριν φανεί η τελευταία κάρτα
        const maxIndex = totalItems - itemsPerSlide;

        nextBtn.disabled = currentIndex >= maxIndex;
        prevBtn.disabled = currentIndex <= 0;
    }

    function nextSlide() {
        const itemsPerSlide = getItemsPerSlide();
        const maxIndex = cards.length - itemsPerSlide;
        
        currentIndex++;
        if (currentIndex > maxIndex) {
            currentIndex = 0; // Επαναφορά στην αρχή (Looping)
        }
        updateCarousel();
    }
    
    // Έναρξη αυτόματης ολίσθησης
    function startAutoSlide() {
        clearInterval(autoSlideInterval);
        autoSlideInterval = setInterval(nextSlide, 5000); 
    }

    // Χειροκίνητη πλοήγηση (διακόπτει και επανεκκινεί την αυτόματη)
    prevBtn.addEventListener('click', () => {
        clearInterval(autoSlideInterval);
        currentIndex = Math.max(0, currentIndex - 1);
        updateCarousel();
        startAutoSlide();
    });

    nextBtn.addEventListener('click', () => {
        clearInterval(autoSlideInterval);
        nextSlide(); // Χρησιμοποιούμε την nextSlide για τη λογική looping
        startAutoSlide();
    });

    // Χειρισμός αλλαγής μεγέθους οθόνης
    window.addEventListener('resize', () => {
        currentIndex = 0; // Επαναφορά στην αρχή για αποφυγή προβλημάτων εμφάνισης
        updateCarousel();
        startAutoSlide(); 
    });

    // Αρχική φόρτωση
    startAutoSlide();
    updateCarousel(); 
});
// Λογική για το Modal της Ιστορίας
const historyModal = document.getElementById('historyModal');
const readMoreBtn = document.getElementById('readMoreBtn');
const closeHistoryBtn = document.querySelector('.close-history');

readMoreBtn.addEventListener('click', () => {

});

closeHistoryBtn.addEventListener('click', () => {

});

historyModal.addEventListener('click', (e) => {
    if (e.target === historyModal) {
        historyModal.style.display = 'none';
        document.body.style.overflow = '';
    }
});
</script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const track = document.getElementById('heroTrack');
    const prevBtn = document.getElementById('heroPrev');
    const nextBtn = document.getElementById('heroNext');
    const items = track.querySelectorAll('.hero-img-item');
    let index = 0;
    let autoPlayInterval;

    function updateHeroPosition() {
        const itemsVisible = window.innerWidth > 768 ? 3 : 1;
        const maxIndex = items.length - itemsVisible;
        
        if (index > maxIndex) index = 0;
        if (index < 0) index = maxIndex;

        const gap = window.innerWidth > 768 ? 15 : 0;
        const slideWidth = items[0].offsetWidth + gap;
        track.style.transform = `translateX(-${index * slideWidth}px)`;
    }

    function startAutoPlay() {
        stopAutoPlay();
        autoPlayInterval = setInterval(() => {
            index++;
            updateHeroPosition();
        }, 4000); // Αλλαγή κάθε 4 δευτερόλεπτα
    }

    function stopAutoPlay() {
        clearInterval(autoPlayInterval);
    }

    nextBtn.addEventListener('click', () => {
        index++;
        updateHeroPosition();
        startAutoPlay(); // Reset timer
    });

    prevBtn.addEventListener('click', () => {
        index--;
        updateHeroPosition();
        startAutoPlay(); // Reset timer
    });

    // Παύση όταν το ποντίκι είναι πάνω, συνέχιση όταν βγαίνει
    const wrapper = document.querySelector('.hero-carousel-wrapper');
    wrapper.addEventListener('mouseenter', stopAutoPlay);
    wrapper.addEventListener('mouseleave', startAutoPlay);

    window.addEventListener('resize', updateHeroPosition);
    
    startAutoPlay();
    updateHeroPosition();
});
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const mobileBtn = document.getElementById('mobileMenuBtn');
    const closeBtn = document.getElementById('closeMobileModal');
    const modal = document.getElementById('mobileModal');
    const modalLinks = document.querySelectorAll('.mobile-links a');

    // Άνοιγμα Modal
    mobileBtn.addEventListener('click', () => {
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Κλείδωμα scrolling
    });

    // Κλείσιμο Modal
    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = ''; // Ξεκλείδωμα scrolling
    }

    closeBtn.addEventListener('click', closeModal);

    // Κλείσιμο όταν πατηθεί σύνδεσμος (π.χ. Μενού)
    modalLinks.forEach(link => {
        link.addEventListener('click', closeModal);
    });
});
</script>
  <script src="lang.js"></script>
  <script>
    function updateMenuPage(lang) {
        const container = document.getElementById('full-menu-content');
        let html = '';

        // Χρήση των δεδομένων από το menuData του lang.js
        for (const [id, data] of Object.entries(menuData)) {
            const category = data[lang];
            html += `
                <div class="menu-category-block animate-on-scroll">
                    <h2 class="category-title">${category.title}</h2>
                    <div class="menu-items-list">
                        ${category.items.map(item => `
                            <div class="menu-item-row">
                                <div class="menu-item-main">
                                    <span class="item-name">${item.name}</span>
                                    <span class="item-dots"></span>
                                    <span class="item-price">€${item.price}</span>
                                </div>
                                ${item.desc ? `<span class="item-desc">${item.desc}</span>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        // Επανεκκίνηση του Observer για το animation
        initObserver();
    }

    function initObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
    }

    // Override της setLanguage ή προσθήκη listener
    document.querySelectorAll('.flag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const lang = btn.getAttribute('data-lang-val');
            updateMenuPage(lang);
        });
    });

    document.addEventListener('DOMContentLoaded', () => {
        const savedLang = localStorage.getItem('preferredLang') || 'el';
        updateMenuPage(savedLang);

        // Mobile Menu Logic
        const mobileBtn = document.getElementById('mobileMenuBtn');
        const closeBtn = document.getElementById('closeMobileModal');
        const modal = document.getElementById('mobileModal');

        mobileBtn.addEventListener('click', () => {
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });

        const closeModal = () => {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        };

        closeBtn.addEventListener('click', closeModal);
        document.querySelectorAll('.mobile-links a').forEach(link => link.addEventListener('click', closeModal));
    });
  </script>
